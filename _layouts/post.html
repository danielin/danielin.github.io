---
layout: default
---

<div class="post-header">
  <a href="/" class="back-link">← 返回首页</a>
  <div class="post-meta">
    <span class="post-date">{{ page.date | date: "%Y-%m-%d" }}</span>
    {% if page.tags %}
    <div class="post-tags">
      {% for tag in page.tags %}
      <span class="tag">{{ tag }}</span>
      {% endfor %}
    </div>
    {% endif %}
  </div>
</div>

<article class="post-content">
  {{ content }}
</article>

<style>
  .post-header {
    margin-bottom: 32px;
  }

  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-secondary);
    text-decoration: none;
    font-size: 0.875rem;
    margin-bottom: 24px;
    transition: all 0.2s ease;
  }

  .back-link:hover {
    border-color: var(--accent);
    color: var(--accent);
    transform: translateX(-4px);
  }

  .post-meta {
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }

  .post-date {
    font-size: 0.875rem;
    color: var(--text-muted);
  }

  .post-tags {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .post-content {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 48px;
  }

  .post-content h1 {
    font-size: 2rem;
    font-weight: 700;
    margin-bottom: 24px;
    background: linear-gradient(135deg, var(--text-primary) 0%, var(--accent) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .post-content h2 {
    font-size: 1.5rem;
    font-weight: 600;
    margin-top: 40px;
    margin-bottom: 16px;
    color: var(--text-primary);
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  .post-content h3 {
    font-size: 1.25rem;
    font-weight: 600;
    margin-top: 32px;
    margin-bottom: 12px;
    color: var(--accent);
  }

  .post-content p {
    margin-bottom: 16px;
    color: var(--text-primary);
  }

  .post-content ul, .post-content ol {
    margin-bottom: 16px;
    padding-left: 24px;
  }

  .post-content li {
    margin-bottom: 8px;
    color: var(--text-primary);
  }

  .post-content strong {
    color: var(--accent);
    font-weight: 600;
  }

  .post-content em {
    color: var(--text-secondary);
  }

  .post-content code {
    font-family: 'JetBrains Mono', monospace;
    background: var(--bg-tertiary);
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 0.875em;
    color: var(--accent);
  }

  .post-content pre {
    background: var(--bg-tertiary);
    padding: 20px;
    border-radius: 8px;
    overflow-x: auto;
    margin-bottom: 20px;
    border: 1px solid var(--border);
  }

  .post-content pre code {
    background: none;
    padding: 0;
    color: var(--text-primary);
  }

  .post-content table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 20px;
  }

  .post-content th, .post-content td {
    padding: 12px 16px;
    text-align: left;
    border-bottom: 1px solid var(--border);
  }

  .post-content th {
    background: var(--bg-tertiary);
    font-weight: 600;
    color: var(--accent);
  }

  .post-content td {
    color: var(--text-primary);
  }

  .post-content blockquote {
    border-left: 4px solid var(--accent);
    padding-left: 20px;
    margin: 20px 0;
    color: var(--text-secondary);
    font-style: italic;
  }

  .post-content hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 32px 0;
  }

  .post-content a {
    color: var(--accent);
    text-decoration: none;
    border-bottom: 1px solid transparent;
    transition: border-color 0.2s ease;
  }

  .post-content a:hover {
    border-bottom-color: var(--accent);
  }

  @media (max-width: 640px) {
    .post-content {
      padding: 24px;
    }
    .post-content h1 {
      font-size: 1.5rem;
    }
    .post-content h2 {
      font-size: 1.25rem;
    }
  }
</style>
